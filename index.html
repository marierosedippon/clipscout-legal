<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ClipScout Legal</title>
  <style>
    :root { color: #141414; background: #fffaf6; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: radial-gradient(circle at top right, rgba(255, 107, 0, 0.18), transparent 320px), #fffaf6; }
    main { width: min(720px, 100%); padding: 32px; border: 1px solid #f1dfd2; border-radius: 18px; background: rgba(255,255,255,0.94); box-shadow: 0 20px 60px rgba(20,20,20,0.08); }
    .mark { width: 68px; height: 68px; display: grid; place-items: center; border-radius: 18px; color: #fff; background: #ff6b00; font-size: 34px; font-weight: 800; }
    h1 { margin: 18px 0 8px; font-size: clamp(36px, 8vw, 64px); line-height: 0.96; letter-spacing: 0; }
    p { color: #646464; font-size: 18px; line-height: 1.5; }
    nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
    a { display: inline-flex; min-height: 48px; align-items: center; padding: 0 18px; border-radius: 999px; color: #fff; background: #ff6b00; font-weight: 800; text-decoration: none; }
    a.secondary { color: #141414; background: #f4eee9; }
  </style>
</head>
<body>
  <main>
    <div class="mark">C</div>
    <h1>ClipScout Legal</h1>
    <p>Privacy Policy, Terms of Use, and community standards for ClipScout.</p>
    <nav>
      <a href="./terms/">Terms of Use</a>
      <a class="secondary" href="./privacy-policy/">Privacy Policy</a>
    </nav>
  </main>
</body>
</html>
